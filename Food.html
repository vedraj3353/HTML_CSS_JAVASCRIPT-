<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      html {
        background-image: linear-gradient(maroon);
      }
      * {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        font-weight: bolder;
      }
      nav {
        height: 111px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border: 1px solid black;
        background-image: linear-gradient(to right, red, deeppink, red);
      }
      .menu {
        text-shadow: 2px 2px 2px white;
        height: 75px;
        width: 400px;
        display: flex;
        justify-content: space-evenly;
        align-items: center;
      }
      a {
        text-decoration: none;
        color: black;
      }
      .welcome {
        display: flex;
        height: 600px;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
        flex-direction: column;
      }
      .bg-video {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: -1;
      }
      button {
        color: black;
        background-image: linear-gradient(orange);
        border-radius: 20px;
        padding-left: 100px;
        padding-right: 100px;
      }
      .list {
        height: 400px;
        display: flex;
        align-items: center;
        justify-content: space-evenly;
      }
      .photo {
        height: 300px;
      }
      .chinese {
        justify-content: center;
        display: flex;
        height: 200px;
        background-image: linear-gradient(gold);
      }
      .reviews {
        height: 400px;
        display: flex;
        align-items: center;
        justify-content: space-evenly;
      }
      .text {
        border-radius: 10%;
        height: 300px;
        width: 300px;
        border: 1px solid black;
        box-shadow: 10px 10px 10px whitesmoke;
      }
      .clist {
        height: 350px;
        display: flex;
        align-items: center;
        justify-content: space-evenly;
      }
      .cphoto {
        height: 300px;
      }

      img {
        border-radius: 10%;
        box-shadow: 10px 10px 10px whitesmoke;
      }
      .Name {
        color: gold;
        font-style: italic;
        text-shadow: 5px 5px 5px black;
      }
      .wel {
        color: gold;
        text-shadow: 5px 5px 5px black;
      }
      .TextArea {
        background-image: linear-gradient(peachpuff);
        color: black;
      }
      button:hover {
        border-radius: 0px;
      }
    </style>
  </head>
